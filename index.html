<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arumeemakeup_ — Makeup Artist Jakarta</title>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #faf6f1;
  --paper:     #f4ede4;
  --warm:      #ede2d5;
  --card:      #ffffff;
  --ink:       #1f1612;
  --text:      #3a2e26;
  --muted:     #8a7869;
  --line:      #e3d6c8;
  --rose:      #c08368;
  --rose-d:    #a8694e;
  --wine:      #5a2030;
  --espresso:  #1a0e0a;
  --cream:     #f8ede0;
}

html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-weight: 300;
  line-height: 1.6;
  overflow-x: hidden;
}
img { display: block; max-width: 100%; height: auto; }

/* ════ NAV ════ */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 22px 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background .4s, padding .3s, border-color .4s;
  border-bottom: 1px solid transparent;
}
nav.scrolled {
  background: rgba(250,246,241,.95);
  backdrop-filter: blur(14px);
  padding: 14px 56px;
  border-bottom-color: var(--line);
}
.brand {
  font-family: 'Italiana', serif;
  font-size: 24px;
  letter-spacing: 1px;
  color: var(--ink);
  text-decoration: none;
}
.nav-menu {
  display: flex;
  gap: 36px;
  list-style: none;
  align-items: center;
}
.nav-menu a {
  font-size: 12px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text);
  text-decoration: none;
  font-weight: 400;
  transition: color .2s;
  position: relative;
}
.nav-menu a:not(.nav-cta)::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0;
  width: 0;
  height: 1px;
  background: var(--rose);
  transition: width .25s;
}
.nav-menu a:not(.nav-cta):hover::after { width: 100%; }
.nav-menu a:hover { color: var(--rose); }
.nav-cta {
  border: 1px solid var(--ink);
  padding: 10px 22px !important;
  letter-spacing: 2px !important;
  transition: background .2s, color .2s;
}
.nav-cta:hover {
  background: var(--ink);
  color: var(--cream) !important;
}
.menu-btn {
  display: none;
  width: 28px;
  height: 20px;
  position: relative;
  background: none;
  border: none;
  cursor: pointer;
}
.menu-btn span {
  position: absolute;
  left: 0; right: 0;
  height: 1.5px;
  background: var(--ink);
}
.menu-btn span:nth-child(1) { top: 0; }
.menu-btn span:nth-child(2) { top: 50%; }
.menu-btn span:nth-child(3) { bottom: 0; }

/* ════ HERO ════ */
.hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--bg);
}
.hero-text {
  padding: 140px 80px 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
}
.hero-marker {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 40px;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}
.hero-marker::before {
  content: '';
  width: 48px;
  height: 1px;
  background: var(--rose);
}
.hero-headline {
  font-family: 'Italiana', serif;
  font-size: clamp(56px, 7vw, 110px);
  font-weight: 400;
  line-height: 0.95;
  letter-spacing: -1px;
  color: var(--ink);
}
.hero-headline em {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  display: block;
  color: var(--rose);
}
.hero-tagline {
  font-size: 17px;
  color: var(--text);
  line-height: 1.85;
  max-width: 440px;
  margin-top: 36px;
  font-weight: 300;
}
.hero-cta-row {
  display: flex;
  gap: 16px;
  margin-top: 44px;
  align-items: center;
  flex-wrap: wrap;
}
.btn-solid {
  background: var(--ink);
  color: var(--cream);
  padding: 18px 36px;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: background .2s;
}
.btn-solid:hover { background: var(--rose-d); }
.btn-line {
  border: 1px solid var(--ink);
  color: var(--ink);
  padding: 18px 36px;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  background: transparent;
  transition: all .2s;
}
.btn-line:hover { background: var(--ink); color: var(--cream); }

.hero-meta {
  display: flex;
  gap: 56px;
  margin-top: 80px;
  padding-top: 36px;
  border-top: 1px solid var(--line);
  flex-wrap: wrap;
}
.hero-stat-num {
  font-family: 'Italiana', serif;
  font-size: 42px;
  letter-spacing: -1px;
  color: var(--ink);
  line-height: 1;
}
.hero-stat-lbl {
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 8px;
  font-weight: 500;
}

.hero-image-wrap {
  position: relative;
  overflow: hidden;
  background: var(--paper);
}
.hero-image-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  filter: contrast(0.96) saturate(0.95);
}
.hero-image-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(31,22,18,.06) 100%);
  pointer-events: none;
}
.hero-image-tag {
  position: absolute;
  bottom: 50px;
  right: 40px;
  background: rgba(248,237,224,.95);
  backdrop-filter: blur(10px);
  padding: 22px 28px;
  border: 1px solid rgba(192,131,104,.3);
  max-width: 240px;
}
.hero-image-tag-lbl {
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--rose);
  margin-bottom: 8px;
}
.hero-image-tag-val {
  font-family: 'Italiana', serif;
  font-size: 32px;
  color: var(--ink);
  line-height: 1;
  letter-spacing: -0.5px;
}
.hero-image-tag-sub {
  font-size: 12px;
  color: var(--text);
  margin-top: 8px;
  line-height: 1.5;
}
.hero-vlabel {
  position: absolute;
  top: 50%;
  left: 26px;
  transform: translateY(-50%) rotate(-90deg);
  transform-origin: left center;
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
.scroll-marker {
  position: absolute;
  bottom: 36px;
  left: 80px;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 14px;
}
.scroll-marker::after {
  content: '';
  width: 1px;
  height: 36px;
  background: var(--muted);
  animation: scrollAnim 2s ease infinite;
}
@keyframes scrollAnim {
  0%, 100% { transform: scaleY(0.2); transform-origin: top; opacity: 0.4; }
  50% { transform: scaleY(1); opacity: 1; }
}

/* ════ MARQUEE ════ */
.marquee {
  background: var(--espresso);
  padding: 22px 0;
  overflow: hidden;
}
.marquee-track {
  display: flex;
  gap: 64px;
  animation: marquee 28s linear infinite;
  white-space: nowrap;
  width: max-content;
}
.marquee-item {
  font-family: 'Italiana', serif;
  font-size: 22px;
  color: var(--cream);
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 28px;
}
.marquee-item::after {
  content: '';
  width: 8px;
  height: 8px;
  background: var(--rose);
  border-radius: 50%;
  display: inline-block;
}
@keyframes marquee {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ════ ABOUT ════ */
.about {
  padding: 130px 56px;
  background: var(--paper);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
  max-width: 1280px;
  margin: 0 auto;
}
.about-image {
  position: relative;
  aspect-ratio: 4 / 5;
  overflow: hidden;
}
.about-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.about-image-frame {
  position: absolute;
  top: 24px; right: -24px;
  width: 100%; height: 100%;
  border: 1px solid var(--rose);
  z-index: -1;
}
.about-content { padding-right: 24px; }
.section-eyebrow {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--rose);
  margin-bottom: 24px;
  font-weight: 500;
}
.section-eyebrow::before {
  content: '';
  width: 32px;
  height: 1px;
  background: var(--rose);
}
.section-heading {
  font-family: 'Italiana', serif;
  font-size: clamp(40px, 4.5vw, 64px);
  line-height: 1;
  color: var(--ink);
  letter-spacing: -1px;
  margin-bottom: 28px;
}
.section-heading em {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--rose);
}
.about-body {
  font-size: 16px;
  line-height: 1.85;
  color: var(--text);
  margin-bottom: 24px;
  font-weight: 300;
}
.about-body strong {
  font-weight: 500;
  color: var(--ink);
}
.about-features {
  margin-top: 40px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  border-top: 1px solid var(--line);
  padding-top: 32px;
}
.feature-item {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}
.feature-num {
  font-family: 'Italiana', serif;
  font-size: 22px;
  color: var(--rose);
  line-height: 1;
  flex-shrink: 0;
  width: 36px;
  border-right: 1px solid var(--line);
  padding-right: 14px;
}
.feature-text {
  font-size: 14px;
  color: var(--text);
  line-height: 1.65;
}
.feature-text strong { color: var(--ink); font-weight: 500; }

/* ════ SERVICES ════ */
.services {
  padding: 130px 56px;
  background: var(--bg);
}
.services-inner { max-width: 1280px; margin: 0 auto; }
.services-header {
  text-align: center;
  margin-bottom: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.services-header .section-eyebrow { justify-content: center; }
.services-header .section-heading { max-width: 700px; }
.services-sub {
  font-size: 16px;
  color: var(--text);
  font-weight: 300;
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.7;
}
.services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-bottom: 60px;
}
.service-card {
  background: var(--card);
  border: 1px solid var(--line);
  position: relative;
  overflow: hidden;
  transition: transform .35s ease, box-shadow .35s;
}
.service-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 30px 60px rgba(31,22,18,.08);
}
.service-image {
  width: 100%;
  aspect-ratio: 5 / 4;
  overflow: hidden;
  background: var(--paper);
}
.service-image img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 1.2s ease;
}
.service-card:hover .service-image img { transform: scale(1.06); }
.service-body { padding: 36px 32px 40px; }
.service-cat {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--rose);
  margin-bottom: 14px;
  font-weight: 500;
}
.service-title {
  font-family: 'Italiana', serif;
  font-size: 30px;
  color: var(--ink);
  line-height: 1.05;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.service-price {
  font-family: 'Italiana', serif;
  font-size: 38px;
  color: var(--wine);
  letter-spacing: -1px;
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-top: 16px;
}
.service-price-sub { font-size: 14px; color: var(--muted); font-family: 'Outfit', sans-serif; font-weight: 400; }
.service-divider { height: 1px; background: var(--line); margin: 24px 0; }
.service-includes {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}
.service-includes li {
  font-size: 14px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 300;
}
.service-includes li::before {
  content: '';
  width: 14px;
  height: 1px;
  background: var(--rose);
  flex-shrink: 0;
}
.service-meta {
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

.addons-section { margin-top: 80px; }
.addons-title {
  font-family: 'Italiana', serif;
  font-size: 32px;
  color: var(--ink);
  margin-bottom: 32px;
  text-align: center;
  letter-spacing: -0.5px;
}
.addons-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
}
.addon-item {
  background: var(--card);
  padding: 32px 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  transition: background .2s;
}
.addon-item:hover { background: var(--paper); }
.addon-name {
  font-family: 'Italiana', serif;
  font-size: 22px;
  color: var(--ink);
  margin-bottom: 4px;
  letter-spacing: -0.3px;
}
.addon-desc {
  font-size: 13px;
  color: var(--muted);
  font-weight: 300;
}
.addon-price {
  font-family: 'Italiana', serif;
  font-size: 28px;
  color: var(--rose);
  letter-spacing: -0.5px;
  flex-shrink: 0;
}
.transport-banner {
  margin-top: 40px;
  background: var(--espresso);
  color: var(--cream);
  padding: 28px 36px;
  display: flex;
  align-items: center;
  gap: 28px;
  border-left: 3px solid var(--rose);
}
.transport-banner-title {
  font-family: 'Italiana', serif;
  font-size: 22px;
  color: var(--rose);
  letter-spacing: 0.5px;
  flex-shrink: 0;
}
.transport-banner-sep { width: 1px; height: 40px; background: rgba(248,237,224,.15); flex-shrink: 0; }
.transport-banner-text { font-size: 14px; color: rgba(248,237,224,.7); line-height: 1.7; font-weight: 300; }

/* ════ PORTFOLIO ════ */
.portfolio {
  padding: 130px 0;
  background: var(--paper);
}
.portfolio-header {
  text-align: center;
  padding: 0 56px;
  margin-bottom: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.portfolio-header .section-eyebrow { justify-content: center; }

.portfolio-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 16px;
  padding: 0 56px;
  max-width: 1400px;
  margin: 0 auto;
}
.portfolio-item {
  overflow: hidden;
  position: relative;
  background: var(--warm);
  cursor: pointer;
}
.portfolio-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 1.2s ease, filter .4s;
}
.portfolio-item:hover img { transform: scale(1.04); filter: brightness(0.85); }
.portfolio-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 50%, rgba(26,14,10,.85) 100%);
  display: flex;
  align-items: flex-end;
  padding: 32px;
  opacity: 0;
  transition: opacity .4s;
}
.portfolio-item:hover .portfolio-overlay { opacity: 1; }
.portfolio-cat {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--rose);
  margin-bottom: 6px;
}
.portfolio-name {
  font-family: 'Italiana', serif;
  font-size: 26px;
  color: var(--cream);
  line-height: 1;
  letter-spacing: -0.5px;
}

/* portfolio item sizes - asymmetric editorial layout */
.portfolio-item.tall { grid-column: span 5; aspect-ratio: 3 / 4; }
.portfolio-item.wide { grid-column: span 7; aspect-ratio: 4 / 3; }
.portfolio-item.med { grid-column: span 6; aspect-ratio: 4 / 5; }
.portfolio-item.full { grid-column: span 12; aspect-ratio: 16 / 7; }

/* ════ PROCESS ════ */
.process {
  padding: 130px 56px;
  background: var(--bg);
}
.process-inner { max-width: 1280px; margin: 0 auto; }
.process-head { margin-bottom: 80px; max-width: 600px; }
.process-list {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-top: 1px solid var(--line);
  border-left: 1px solid var(--line);
}
.process-step {
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 44px 36px;
  background: var(--card);
  transition: background .25s;
}
.process-step:hover { background: var(--paper); }
.process-num {
  font-family: 'Italiana', serif;
  font-size: 56px;
  color: var(--line);
  line-height: 1;
  margin-bottom: 28px;
  letter-spacing: -1.5px;
  transition: color .25s;
}
.process-step:hover .process-num { color: var(--rose); }
.process-step-title {
  font-family: 'Italiana', serif;
  font-size: 22px;
  color: var(--ink);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}
.process-step-desc {
  font-size: 13px;
  color: var(--text);
  line-height: 1.75;
  font-weight: 300;
}

/* ════ FAQ ════ */
.faq {
  padding: 130px 56px;
  background: var(--paper);
}
.faq-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1.5fr;
  gap: 100px;
  align-items: start;
}
.faq-aside { position: sticky; top: 110px; }
.faq-list { border-top: 1px solid var(--line); }
.faq-row { border-bottom: 1px solid var(--line); }
.faq-q-btn {
  width: 100%;
  background: none;
  border: none;
  padding: 28px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  cursor: pointer;
  text-align: left;
  font-family: 'Italiana', serif;
  font-size: 22px;
  color: var(--ink);
  letter-spacing: -0.3px;
  transition: color .2s;
}
.faq-q-btn:hover { color: var(--rose); }
.faq-toggle {
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  border: 1px solid var(--line);
  border-radius: 50%;
  position: relative;
  transition: all .3s;
}
.faq-toggle::before, .faq-toggle::after {
  content: '';
  position: absolute;
  background: var(--ink);
  transition: all .3s;
}
.faq-toggle::before {
  top: 50%; left: 25%; right: 25%; height: 1px; transform: translateY(-50%);
}
.faq-toggle::after {
  left: 50%; top: 25%; bottom: 25%; width: 1px; transform: translateX(-50%);
}
.faq-row.open .faq-toggle { background: var(--ink); border-color: var(--ink); }
.faq-row.open .faq-toggle::before { background: var(--cream); }
.faq-row.open .faq-toggle::after { transform: translateX(-50%) scaleY(0); }
.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height .4s ease;
}
.faq-row.open .faq-a { max-height: 320px; }
.faq-a-text {
  padding: 0 0 28px;
  font-size: 15px;
  line-height: 1.85;
  color: var(--text);
  font-weight: 300;
  max-width: 600px;
}

/* ════ T&C ════ */
.tnc {
  padding: 130px 56px;
  background: var(--bg);
}
.tnc-inner { max-width: 1280px; margin: 0 auto; }
.tnc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-top: 60px;
}
.tnc-card {
  background: var(--card);
  border: 1px solid var(--line);
  padding: 48px 44px;
}
.tnc-card.dark {
  background: var(--espresso);
  border-color: transparent;
}
.tnc-card-num {
  font-family: 'Italiana', serif;
  font-size: 14px;
  color: var(--rose);
  margin-bottom: 12px;
